# Processing Levels 1 to 3 - Sub-Recipe
#
# Dataset-agnostic processing pipeline. Takes already-downloaded (or
# user-provided) raw acoustic files and produces a clean Sv dataset and MVBS.
# Intended to be included from a parent recipe that supplies all path/cruise
# inputs and any dataset-specific overlays.
#
# Two supported usage modes:
#   - "BYO folder": parent passes a literal raw_input_folder pointing at a
#     directory the user already has. Optionally pass raw_file_names to
#     restrict processing to a subset of files within that folder.
#   - "Download": parent runs query_ncei_data + download_ncei_data and
#     overrides raw_input_folder with ${download_raw.download_dir}. The
#     value reference automatically creates a DAG edge so this sub-recipe
#     runs after the download step (no depends_on needed).

recipe:
  name: "processing_lvls_1_to_3"
  description: "Raw acoustic files to clean Sv and MVBS."
  version: "1.0"
  author: "<Your Name>"
  schema_version: "1"

inputs:
  raw_input_folder:
    type: path
    description: "Folder containing the raw acoustic files."
  cal_input_folder:
    type: path
    description: "Folder containing standardized calibration files."
  calibration_outputs:
    type: str
    default: "calibration"
    description: "Subdirectory name under the pipeline outputs folder for calibration artifacts."
  cruise_id:
    type: str
    description: "Cruise identifier used in calibration mapping."
  record_author:
    type: str
    default: "<Your Name>"
  sonar_model:
    type: str
    default: "EK60"
  raw_file_names:
    type: list
    default: []
    description: >
      Optional subset of filenames within raw_input_folder to use. Empty list
      means "use every .raw file in the folder". Note that
      generate_standardized_cal_mapping always scans the full folder; this
      input only constrains the set of files that get opened and processed.
  file_time_start:
    type: str
    required: false
    description: >
      Optional inclusive ISO datetime (e.g. "2016-07-25T20:58") restricting
      processing to raw files whose filename-encoded time
      (D{YYYYMMDD}-T{HHMMSS}) falls in the window. Applies to both the
      processed file set and the calibration scan. Leave unset to process every
      file. Works for local and gs:// folders; filtering reads only file names.
  file_time_end:
    type: str
    required: false
    description: "Optional inclusive ISO datetime upper bound; see file_time_start."
  intermediate_format:
    type: str
    default: "netcdf"
    description: >
      Per-file intermediate store format written between read_raw and
      combine_raw. "netcdf" (default) requires a local --temp-dir. Use "zarr"
      when pointing --temp-dir at a bucket, which keeps local disk usage to
      roughly one raw file for the whole run.
  range_bin:
    type: str
    default: "20m"
    description: >
      Range bin size shared by per-cell statistics, sparse-bin masking, and
      MVBS computation.
  ping_time_bin:
    type: str
    default: "20s"
    description: >
      Ping-time bin size shared by per-cell statistics, sparse-bin masking,
      and MVBS computation.

steps:

  - id: initial_setup
    op: initial_setup
    params:
      raw_input_folder: ${inputs.raw_input_folder}
      calibration_outputs: ${inputs.calibration_outputs}
      raw_file_names: ${inputs.raw_file_names}
      clear_previous_json_logs: true
      file_time_start: ${inputs.file_time_start}
      file_time_end: ${inputs.file_time_end}

  - id: gen_cal_mapping
    op: generate_standardized_cal_mapping
    params:
      raw_input_folder: ${inputs.raw_input_folder}
      cal_input_folder: ${inputs.cal_input_folder}
      output_base: ${initial_setup.calibration_output_dir}
      cruise_id: ${inputs.cruise_id}
      record_author: ${inputs.record_author}
      short_filenames: true
      keep_unused: true
      conflict_resolution: "error"
      file_time_start: ${inputs.file_time_start}
      file_time_end: ${inputs.file_time_end}

  - id: read_raw
    op: read_raw_files
    inputs:
      raw_file_paths: ${initial_setup.raw_file_paths}
    params:
      sonar_model: ${inputs.sonar_model}
      include_bot: true
      intermediate_format: ${inputs.intermediate_format}

  - id: combine_raw
    op: combine_raw_files
    checkpoint: always
    inputs:
      raw_stores: ${read_raw.raw_stores}

  - id: extract_cal_params
    op: extract_standardized_cal_params
    inputs:
      calibration_dict: ${gen_cal_mapping.calibration_dict}
      mapping_dict: ${gen_cal_mapping.mapping_dict}
      echodata: ${combine_raw.echodata}

  - id: compute_sv
    op: compute_sv
    checkpoint: always
    inputs:
      echodata: ${combine_raw.echodata}
      cal_params: ${extract_cal_params.cal_params}
      env_params: ${extract_cal_params.env_params}

  # NOTE: In some cases you may need to manually set depth_offset (transducer depth)
  - id: ep_add_depth
    op: ep_add_depth
    inputs:
      ds_Sv: ${compute_sv.ds_Sv}
      echodata: ${combine_raw.echodata}

    params:
      # NOTE: keep depth grid uniform across ping_time so echopype's
      # ``basic`` seafloor detector accepts the dataset.
    #  depth_offset: 0.0
     use_platform_vertical_offsets: true

  - id: ep_add_splitbeam_angle
    op: ep_add_splitbeam_angle
    inputs:
      ds_Sv: ${ep_add_depth.ds_Sv}
      echodata: ${combine_raw.echodata}
    params:
      waveform_mode: "CW"
      encode_mode: "power"
      to_disk: false

  - id: log_seafloor_stats
    op: log_seafloor_detection_stats
    inputs:
      echodata: ${combine_raw.echodata}
      ds_Sv: ${compute_sv.ds_Sv}
    params:
      min_valid_depth_m: 10.0

  - id: detect_seafloor
    op: detect_seafloor
    depends_on: [log_seafloor_stats]
    inputs:
      ds_Sv: ${compute_sv.ds_Sv}
      echodata: ${combine_raw.echodata}
    params:
      min_valid_depth_m: 10.0

  # - id: detect_seafloor
  #   op: ep_detect_seafloor
  #   inputs:
  #     ds_Sv: ${ep_add_splitbeam_angle.ds_Sv}
  #   params:
  #     method: "basic"
  #     method_params:
  #       var_name: "Sv"
  #       channel: "GPT  38 kHz 0090720346bc 1-1 ES38B"


  - id: create_seafloor_mask
    op: create_seafloor_mask
    inputs:
      ds_Sv: ${ep_add_splitbeam_angle.ds_Sv}
      seafloor_depth: ${detect_seafloor.seafloor_depth}
    params:
      seafloor_buffer_m: 100

  - id: create_surface_mask
    op: create_surface_mask
    inputs:
      ds_Sv: ${compute_sv.ds_Sv}
    params:
      surface_depth_m: 10.0

  - id: create_frequency_mask
    op: create_frequency_mask
    inputs:
      ds_Sv: ${compute_sv.ds_Sv}
    params:
      frequencies_to_mask: [70, 120, 200]

  - id: combine_masks
    op: combine_masks
    inputs:
      masks:
        - ${create_seafloor_mask.mask}
        - ${create_surface_mask.mask}
        - ${create_frequency_mask.mask}
    params:
      mode: "and"

  - id: apply_mask
    op: apply_sv_mask
    inputs:
      ds_Sv: ${compute_sv.ds_Sv}
      mask: ${combine_masks.mask}

  - id: remove_noise
    op: remove_background_noise
    checkpoint: always
    inputs:
      ds_Sv: ${apply_mask.ds_Sv}
    params:
      noise_range_sample_num: 10
      noise_ping_num: 5

  - id: mask_sparse
    op: mask_sparse_bins
    inputs:
      ds_Sv: ${remove_noise.ds_Sv}
    params:
      range_bin: ${inputs.range_bin}
      ping_time_bin: ${inputs.ping_time_bin}
      nan_threshold: 0.6

  - id: compute_mvbs
    op: compute_mvbs
    checkpoint: always
    inputs:
      ds_Sv: ${mask_sparse.ds_Sv}
    params:
      range_bin: ${inputs.range_bin}
      ping_time_bin: ${inputs.ping_time_bin}
